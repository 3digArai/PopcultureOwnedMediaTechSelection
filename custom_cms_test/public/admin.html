<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 | Custom CMS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <p class="badge">Custom CMS Admin</p>
      <h1>投稿管理</h1>
      <div id="auth-panel" class="panel">
        <h2>ログイン</h2>
        <label>ユーザー名</label>
        <input id="login-user" value="admin" />
        <label>パスワード</label>
        <input id="login-pass" type="password" />
        <div class="row" style="margin-top: 8px">
          <button id="login-btn">ログイン</button>
          <button id="logout-btn" type="button">ログアウト</button>
          <span id="auth-msg" class="muted"></span>
        </div>
      </div>

      <div class="split" style="margin-top: 12px">
        <section class="panel">
          <h2>投稿一覧</h2>
          <p class="muted">選択して編集。公開状態もここで確認。</p>
          <div id="admin-list" class="list"></div>
        </section>
        <section class="panel">
          <h2>投稿編集</h2>
          <input id="post-id" type="hidden" />
          <label>タイトル</label>
          <input id="post-title" />
          <label>スラッグ（省略可）</label>
          <input id="post-slug" />
          <label>概要</label>
          <textarea id="post-excerpt" style="min-height: 80px"></textarea>
          <label>本文（HTML）</label>
          <textarea id="post-body"></textarea>
          <label>ステータス</label>
          <select id="post-status">
            <option value="draft">draft</option>
            <option value="published">published</option>
          </select>
          <div class="row" style="margin-top: 8px">
            <button id="save-btn">保存</button>
            <button id="new-btn" type="button">新規</button>
            <button id="delete-btn" type="button">削除</button>
          </div>
          <p id="edit-msg" class="muted"></p>
        </section>
      </div>
      <p style="margin-top: 12px"><a href="/">公開一覧へ</a></p>
    </main>
    <script type="module" src="/admin.js"></script>
  </body>
</html>
